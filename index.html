<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Registration Form</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">
<h2>Registration Form</h2>

<form id="form">

<!-- NAME -->
<div class="input-box">
<input type="text" id="username" placeholder="Full Name">
</div>

<!-- EMAIL -->
<div class="input-box">
<input type="email" id="email" placeholder="Email">
</div>

<!-- PHONE -->
<div class="input-box phone">
<span>+91</span>
<input type="tel" id="phone" maxlength="10" placeholder="Phone Number">
</div>

<!-- PIN CODE -->
<div class="input-box">
<input type="text" id="pincode" maxlength="6" placeholder="PIN Code">
</div>

<!-- ADDRESS -->
<div class="input-box">
<input type="text" id="address" placeholder="Full Address">
</div>

<!-- PASSWORD -->
<div class="input-box">
<input type="password" id="password" placeholder="Password">
<i class="fa fa-eye" id="togglePassword"></i>
</div>

<!-- STRENGTH -->
<div class="strength-box">
<div class="strength-bar" id="strengthBar"></div>
</div>
<p id="strengthText"></p>

<!-- CHECKLIST -->
<div class="checklist">
<p id="len">❌ At least 6 characters</p>
<p id="upper">❌ One uppercase letter</p>
<p id="number">❌ One number</p>
<p id="special">❌ One special character</p>
</div>

<!-- CONFIRM -->
<div class="input-box">
<input type="password" id="cpassword" placeholder="Confirm Password">
</div>

<!-- IMAGE -->
<div class="upload-box" id="uploadBox">
<p>Upload Photo</p>
<input type="file" id="fileInput" hidden>
<img id="preview">
</div>

<!-- SUBMIT -->
<button type="submit">Submit</button>

</form>

</div>

<script src="script.js"></script>
</body>
</html>
